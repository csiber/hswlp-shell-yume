<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - Yumekai</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #9fe8ff55, transparent 60%),
          radial-gradient(circle at 80% 10%, #7fd8ff55, transparent 55%),
          linear-gradient(160deg, #0b2446, #123960);
        color: #eaf7ff;
      }
      .card {
        width: min(560px, calc(100vw - 32px));
        padding: 24px;
        border-radius: 16px;
        border: 1px solid #8ac8ff55;
        background: #0f2f5399;
        backdrop-filter: blur(8px);
      }
      h1 { margin: 0 0 8px; font-size: 1.4rem; }
      p { margin: 0; opacity: 0.9; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>Yumekai is still available in limited mode. Cached tracks and assets can continue to load.</p>
    </main>
  </body>
</html>
